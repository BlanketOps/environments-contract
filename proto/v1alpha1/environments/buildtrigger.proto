syntax = "proto3";

package blanketops.environments.v1alpha1;

option go_package = "github.com/ntlaletsi70/blanketops-environments-contract/gen/go/environments/v1alpha1;v1alpha1";

import "google/protobuf/timestamp.proto";


// -----------------------------------------------------------------------------
// BuildTrigger
// -----------------------------------------------------------------------------

message BuildTrigger {
  BuildTriggerSpec spec = 1;
  BuildTriggerStatus status = 2;
}


// -----------------------------------------------------------------------------
// Spec
// -----------------------------------------------------------------------------

message BuildTriggerSpec {
  // Origin of the trigger
  TriggerSource source = 1;

  // Type of event
  TriggerType type = 2;

  // Repository identifier (org/name)
  string repository = 3;

  // Git ref (branch, tag, PR ref)
  string ref = 4;

  // Commit SHA (if applicable)
  string sha = 5;

  // Actor that caused the event
  string actor = 6;

  // External event ID for idempotency
  string event_id = 7;

  // Target build
  BuildRef build = 8;
}


// -----------------------------------------------------------------------------
// References
// -----------------------------------------------------------------------------

message BuildRef {
  string name = 1;
}


// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum TriggerSource {
  TRIGGER_SOURCE_UNSPECIFIED = 0;
  GITHUB = 1;
  GITLAB = 2;
  MANUAL = 3;
}

enum TriggerType {
  TRIGGER_TYPE_UNSPECIFIED = 0;
  PUSH = 1;
  PULL_REQUEST = 2;
  MANUAL_TRIGGER = 3;
}


// -----------------------------------------------------------------------------
// Status
// -----------------------------------------------------------------------------

message BuildTriggerStatus {
  enum Phase {
    PHASE_UNSPECIFIED = 0;
    PENDING = 1;
    ACCEPTED = 2;
    REJECTED = 3;
    CONSUMED = 4;
  }

  Phase phase = 1;

  // Reason for acceptance or rejection
  string reason = 2;

  // Component that accepted the trigger
  string accepted_by = 3;

  // Execution created as a result
  string execution_ref = 4;

  // Human-readable status message
  string message = 5;

  // When the trigger was last processed
  google.protobuf.Timestamp observed_at = 6;
}
